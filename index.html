<!DOCTYPE html>
<html>
<head>
  <title>LyricStage</title>
  <link rel="stylesheet" href="css/styleMain.css">
</head>

<body>

  <div id="passwordGate" class="password-gate">
  <div class="gate-box">
    <h2>Enter Password</h2>

    <input
      type="password"
      id="passwordInput"
      placeholder="Password..."
      autocomplete="off"
    />

    <button onclick="checkPassword()">Enter</button>

    <p id="passwordError" class="error"></p>
  </div>
</div>

<header class="header">
  <h1>LyricStage</h1>
  <p>Choose a mode to begin</p>
</header>

<main class="menu">

  <a class="big-button lyrics" href="lyricsIndex.html">
    &#127908; <br> Live Karaoke <br>&#9679; Lyrics Mode &#9679;
  </a>

  <a class="big-button chords" href="chordsIndex.html">
    &#127928; <br> Live Guitaraoke <br>&#9679; Chords Mode &#9679;</h2>
  </a>


</main>

<main class="menu">

  <a class="big-button solo" href="chordsIndex.html">
    &#127908; <br> Live Performance <br>&#9679; Solo Mode &#9679;
  </a>

  <a class="big-button band" href="chordsIndex.html">
    &#127928; <br> Live Performance <br>&#9679; Band Mode &#9679;
  </a>

</main>

<main class="menu">

  <a class="big-button chords" href="originalsIndex.html">
    &#127928; <br> Original Music</h2>
  </a>

  


</main>

  <script>
  const CORRECT_PASSWORD = "8765432"; // <-- change this

  function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    const error = document.getElementById("passwordError");

    if (input === CORRECT_PASSWORD) {
      document.getElementById("passwordGate").style.display = "none";
    } else {
      error.textContent = "Incorrect password";
    }
  }

  // Optional: press Enter to submit
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      checkPassword();
    }
  });
</script>
</body>
</html>
